language: TypeScript
runtime: Node 20
framework: NestJS 10
orm: Prisma 5
api_style: REST
validation: zod

versioning:
  node: '20.x'
  typescript: '^5'
  nestjs: '^10'
  prisma: '^5'

forbidden:
  - Использование ORM или query-слоя вне утверждённого стека без решения команды
  - Неявные any и отключение строгой типизации ради быстрого исправления
  - Прямой доступ к БД из контроллеров
  - Скрытые сайд-эффекты в helper-функциях

rules:
  - Использовать явные типы входов и выходов на границах модуля
  - Валидировать внешние входные данные
  - Ошибки домена возвращать явно или оформлять через утверждённый error-policy
  - Не менять внешнее поведение без обновления контракта
  - Каждое значимое изменение должно сопровождаться тестом
  - Для наблюдаемости использовать структурированные логи

logging:
  format: structured
  required_fields:
    - trace_id
    - contract_id
    - module_id
    - event_name

compatibility_notes:
  - Перед обновлением зависимостей проверять совместимость генераторов, тестов и CI
  - Не генерировать код под устаревшие API библиотек
