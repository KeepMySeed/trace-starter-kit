system_name: Example Business Platform
primary_goal: >-
  Обеспечивать предсказуемую и объяснимую обработку ключевых бизнес-сценариев
  без нарушения инвариантов домена и внешних контрактов.

product_scope:
  - Управление бизнес-сущностями и их жизненным циклом
  - Внутренние процессы и интеграционные сценарии
  - Наблюдаемость и трассируемость изменений

non_goals:
  - Не перепроектировать доменную модель без отдельного архитектурного решения
  - Не менять внешние контракты API без подтверждения
  - Не вводить новые зависимости без инженерного обоснования

critical_invariants:
  - Все критичные операции должны быть воспроизводимы и объяснимы
  - Ошибки не должны приводить к тихой потере данных
  - Внешние события должны иметь наблюдаемый и проверяемый путь обработки
  - Изменения не должны нарушать обратную совместимость без одобрения

success_criteria:
  - Изменение решает целевую задачу и проходит обязательные проверки
  - Контракты и документация синхронизированы с кодом
  - Поведение можно объяснить через логи, тесты и артефакты TRACE
  - Минимизирован объём побочных изменений

key_use_cases:
  - id: UC-1
    actor: Пользователь
    action: Выполняет целевую бизнес-операцию
    goal: Получить корректный и объяснимый результат
  - id: UC-2
    actor: Интеграционная система
    action: Отправляет событие или запрос
    goal: Получить корректную обработку без дублирования и потери данных
  - id: UC-3
    actor: Разработчик или AI-агент
    action: Вносит изменение
    goal: Изменить только нужный участок системы без архитектурного дрейфа

quality_attributes:
  - traceability
  - predictability
  - maintainability
  - observability
  - backward_compatibility

agent_policy:
  green_zone:
    - Локальные исправления внутри существующего контракта
    - Добавление и обновление тестов
    - Синхронизация документации и логов
  yellow_zone:
    - Изменение public API
    - Изменение схемы БД
    - Новая библиотека или сервисная зависимость
    - Изменение межмодульного контракта
  red_zone:
    - Изменение архитектурных границ модулей без решения архитектора
    - Ослабление требований безопасности
    - Удаление трассируемости или наблюдаемости
